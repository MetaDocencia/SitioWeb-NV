# ── INFRAESTRUCTURA ────────────────────────────────────────────────────

- id: wolovick-2025
  nombre: "Nicolás Wolovick"
  rol: "Director"
  org: "UNC Supercómputo"
  cita: "Participar en el proyecto Catalyst resultó muy importante para UNC Supercómputo. Aprendimos a movernos en un ecosistema de financiamiento y colaboración que nos resultaba novedoso. Conocimos y nos hicimos conocer, valoramos y nos valoraron en redes más grandes con Latinoamérica y África. El plan de montar una nube local para JupyterHub es un proyecto que sigue progresando y que tiene mucho potencial en presente y en futuro."
  categoria: "infraestructura"
  año: "2025"
  link: ""

- id: olivera-2025
  nombre: "Andrés Olivera"
  rol: ""
  org: "Latin America Bioimaging"
  cita: "Participar en Catalyst nos permitió probar y determinar la infraestructura necesaria para un ecosistema sostenible con líderes locales capacitados. Comprobamos que el acceso abierto a esta infraestructura es vital para impulsar investigaciones locales y amplificar el impacto científico regional."
  categoria: "infraestructura"
  año: "2025"
  link: ""

- id: marina-compagnucci
  nombre: "Marina Compagnucci"
  rol: "Bióloga y colaboradora de MetaDocencia"
  org: ""
  cita: "Trabajar con MetaDocencia es sentirse orgullosamente parte de un equipo atento, cálido, diverso, responsable y comprometido con su objetivo y con las personas que hacen a MetaDocencia. No es de extrañar la creatividad de las propuestas cuando es natural la comodidad y la tranquilidad del diálogo en ese espacio."
  categoria: "infraestructura"
  año: "2025"
  link: ""
  destacado: true
  orden_destacado: 3

